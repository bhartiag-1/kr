<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="icon" type="image/png" href="favicon.png">
    <title>Your Cart | Krishna Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo-area">
        <img src="logo.png" class="logo" alt="Logo">
        <div>
            <h1 style="margin:0; font-size:1.2rem;">Krishna Collection</h1>
            <p style="margin:0; font-size:0.8rem;">Quality Promise</p>
        </div>
    </div>
    <div class="nav-links">
        <a href="index.html" style="text-decoration:none; color:#007bff; font-weight:bold;">🛒 Continue Shopping</a>
    </div>
</nav>

<div class="cart-container">
    <div class="cart-main">
        <h2 class="cart-title">YOUR CART (<span id="cart-item-count">0</span> ITEMS)</h2>
        <hr>
        <div id="cart-items-list">
            </div>
        <div class="subtotal-footer">
            <span>Subtotal</span>
            <span id="footer-subtotal">₹0.00</span>
        </div>
    </div>

    <div class="cart-sidebar">
        <div class="summary-box">
            <h3>Summary</h3>
            <div class="summary-row">
                <span>Items Subtotal</span>
                <span id="summary-subtotal">₹0.00</span>
            </div>
            <div class="summary-row">
                <span>Estimated Shipping</span>
                <span class="free-text">Free</span>
            </div>
            <hr>
            <div class="summary-row total-row">
                <span>Total</span>
                <span id="summary-total">₹0.00</span>
            </div>
            
            <button class="btn-checkout whatsapp" onclick="orderAll()">
                💬 COMPLETE ORDER ON WHATSAPP
            </button>
            <button class="btn-continue" onclick="window.location.href='index.html'">
                CONTINUE SHOPPING
            </button>
        </div>
    </div>
</div>

<script src="cart.js"></script>
</body>
</html>
